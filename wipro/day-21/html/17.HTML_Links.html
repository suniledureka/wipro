<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>links</title>
    <style>
        body{
            background:linear-gradient(180deg, orange, white, green);
            height:800px;
        }
        a{
            color:white;
            font-size:22px;
            text-decoration:none;
            margin-right:100px;
            text-align:center;
            width:170px;
            display: inline-block;
            background: linear-gradient(45deg, #11998E , #38EF7D);
            padding: 5px;
            border-radius:15px;
            box-shadow:0 0 10px black;
        }
        a:hover{
            background: linear-gradient(45deg, #C6EA8D , #FE90AF);
            text-transform: uppercase;
            box-shadow:0 0 20px white;
            text-shadow:0 0 10px black
        }
    </style>
</head>
<body>
    <a href="">Wipro</a>
    <a href="">Cognizant</a>
    <a href="">Capgemini</a>
</body>
</html>
