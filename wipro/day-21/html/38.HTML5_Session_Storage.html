<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Storage - session</title>
    <style>
        *{
            font-size:20px;
        }
        div{
            font-family: 'comic sans ms', serif;
            color: maroon;
            margin-bottom:50px;
        }
    </style>
</head>

<body>
    <p>
        <button onclick="clickCounter()" >Click Me!</button>
    </p>

    <div id="result"></div>

    <p>Click the button to see the counter increase.</p>

    <p>Close the browser tab (or window), and try again, and the counter will reset.</p>

    <script>
        function clickCounter() {
            if (typeof (Storage) !== "undefined") {
                if (sessionStorage.clickcount) {
                    sessionStorage.clickcount = Number(sessionStorage.clickcount) + 1;
                } else {
                    sessionStorage.clickcount = 1;                    
                }
                document.getElementById("result").innerHTML = "You have clicked the button " + sessionStorage.clickcount + " time(s).";
            } else {
                document.getElementById("result").innerHTML = "Sorry, your browser does not support web storage...";
            }
        }
    </script>
</body>

</html>
