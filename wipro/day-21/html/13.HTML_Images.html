<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="images/logo.png" type="image/png"> 
    <title>Images in Webpage</title>
    <style>
        body{
            margin-bottom: 500px;
        }

        #computer_pic{
            width:250px;
            /*border: 5px solid black;*/
            border-width: 5px;
            border-style: solid;
            border-color: black;
            border-radius: 10px;
            padding:3px;
            box-shadow: 0 0 10px black;
        }
    </style>
</head>
<body>
    <div>
        <h2>Simple Images</h2>
        <img src="images/logo.png" alt="wipro logo"  >
        <img src="logo.png" alt="wipro logo" hspace="100px">
        <img src="../logo.png" alt="wipro logo">
    </div>

    <div>
        <h2>Image with width & height</h2>
        <img src="images/computer3.jpg" alt="computer image" width="250px" height="180px">
    </div>

    <div>
        <h2>Image with border</h2>
        <img src="images/computer2.jpg" alt="computer image" width="250px" height="180px" border="5">
    </div>   
    
    <div>
        <h2>Image with border using CSS</h2>
        <img src="images/computer1.jpg" alt="computer image" width="250px" height="180px" style="border: 5px solid red">
    </div>   
    
    <div>
        <h2>Image using Global URL</h2>
        <img src="https://www.mapsofindia.com/images2/india-map-2019.jpg" alt="India Map">
    </div>   
    
    <div>
        <h2>Image as a Photo Frame</h2>
        <img src="images/computer7.jpg" alt="India Map" id="computer_pic">
    </div>         
</body>
</html>
