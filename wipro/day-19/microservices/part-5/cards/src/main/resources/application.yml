server:
  port: 9000
spring:
  datasource:
    url: jdbc:h2:mem:cardsdb
    driverClassName: org.h2.Driver
    username: admin
    password: 1234
  h2:
    console:
      enabled: true
  jpa:    
    hibernate:
      ddl-auto: update
    show-sql: true
  application:
    name: cards
eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true
info:
  app:
    name: cards
    details: "Wipro Bank Cards Microservice"
    version: "1.0.2"
    team: "team@wipro"
  techstack:
    front-end: "React JS"
    back-end: "spring boot 3.3.2"
management:
  endpoints:
    web:
      exposure:
        include: "*"
  info:
    env:
      enabled: true