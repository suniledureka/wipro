server:
  port: 8080
spring:
  application:
    name: accounts			
  datasource:
    url: jdbc:h2:mem:accountsdb
    driverClassName: org.h2.Driver
    username: sa
    password: ''
  h2:
    console:
      enabled: true
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: true
eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    serviceUrl:
      defaultZone: http://localhost:8761/eureka/     
  instance:
    prefer-ip-address: true
management:
  endpoints:
    web:
      exposure:
        include: "*"
  info:
    env:
      enabled: true
info:
  app:
    name: "accounts"
    description: "Accounts related microservices in Wipro Bank Network"
    version: "1.0.1"

accounts:
  message: "Welcome to Wipro Bank accounts related APIs"
  contactDetails:
    name: "Sunil Joseph - Developer"
    email: "sunil@wipro.com"
  onCallSupport:
    - (40) 238-41700
    - (40) 238-41701



