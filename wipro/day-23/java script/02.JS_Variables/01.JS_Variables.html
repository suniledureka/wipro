<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Variables</title>
</head>
<body>
    <nav>
        <h2>
            Java Script | Variables
        </h2>
    </nav>

    <script>
        var firstName = 'Sunil'
        console.log(firstName)
        console.log('First Name = ' + firstName)

        let lastName = "Joseph"
        console.info(lastName)
        console.info("Last Name = "+ lastName)
        console.log('-----------------------')

        /*----- difference between var and let -----*/
        var age = 25
        var age = 26 //redeclaration is allowed
        console.log(age)
        console.log('-----------------------')

        let plotNo = 95 //as on ES6
        //let plotNo = 96 //Uncaught SyntaxError: redeclaration of let plotNo
        console.log(plotNo) 
        
        
        console.log(name)
        var name
        //let name //Uncaught ReferenceError:: can't access lexical declaration `name' before initialization
        
        //----- difference 3 var got function scope where as let have got block level scope------
        for(var i=1; i<=5; i++){
            console.log(i);
        }
        console.log('---- outside block --> ' + i) //6
        console.log();
        
        for(let x=1; x<=5; x++){
            console.log(x);
        }
        console.log('---- outside block --> ' + x) //Uncaught ReferenceError: x is not defined      
    </script>
</body>
</html>
