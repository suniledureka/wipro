<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Functions</title>

<body>
    <div>
        <h2>JS Functions | Basics</h2>
    </div>

    <script>
         /* function definition to display first 10 natural Numbers*/
      
        /*function call*/
        function printNaturals(){
            let nat = ''
            for(let n=1;n<=10;n++){
                if(n==1)
                  nat = n
                else
                  nat = `${nat}, ${n}`  
            }
            console.log(nat)
            console.log()
        }  
      
        printNaturals();
        printNaturals();
        printNaturals();
       
    </script>
</body>
