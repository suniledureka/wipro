        <h2>Java Script Spread Operator</h2>

    <script>
        function myBiodata(firstName, lastName, company) {

        }

        let myDetails = ['Sunil', 'Joseph', 'example.com'];

        //console.log(myBiodata(myDetails));
        console.log(myBiodata(...myDetails));
    </script>
