<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" integrity="sha512-Kc323vGBEqzTmouAECnVceyQqyqdsSiqLQISBL29aUW4U/M7pSPA/gEUZQqv1cwx4OnYxTxve5UMg5GT6L4JJg==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <style>
        body{
            margin:0px;
        }
        #ver_nav{
            width:260px;
            background:linear-gradient(45deg,black,darkred);
            height:100vh;
            box-shadow:0 0 10px black;
            text-align:center;
        }
        #ver_nav a{
            display:block;
            padding:10px 0px;
            
            text-decoration: none;
            font-size:22px;
            color:white;
            width:70%;
            margin:auto;
            margin-bottom:20px;
        }
        .fa-user-circle{
            font-size:100px;
            border:5px solid white;
            border-radius:50%;
            box-shadow:0 0 10px white;
            margin-bottom:40px;
            margin-top:20px;
            
        }
        #ver_nav a:hover{
            background:linear-gradient(45deg,black,orangered);
            border-radius:15px;
            box-shadow:0 0 10px white;
        }
    </style>
    <title>Vertical Navigation</title>
</head>
<body>
    <div id="ver_nav">
        <i class="fa fa-user-circle"></i>
        <a href="#">Home</a>
        <a href="#">About</a>
        <a href="#">Services</a>
        <a href="#">Batches</a>
        <a href="#">Contact</a>
    </div>
    <i class="fa-solid fa-star"></i>
</body>
</html>
