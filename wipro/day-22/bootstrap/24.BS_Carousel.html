<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.12.0-2/css/all.min.css">
    <link rel="stylesheet" href="css/bootstrap.css">
    <link rel="stylesheet" href="css/styles.css">
    <style>

    </style>
    <title>BS | Carousel</title>
</head>

<body class="bg-dark text-white">
    <nav>
        <h2>Bootstrap | Carousel</h2>
    </nav>

    <div class="container mt-5">
        <h3>SIMPLE SLIDER</h3>
        <div class="carousel slide" data-bs-ride="carousel">
            <div class="carousel-inner">
                <div class="carousel-item active">
                    <img src="images/corporate1.jpg" class="w-100" alt="">
                </div>
                <div class="carousel-item">
                    <img src="images/corporate2.jpg" class="w-100" alt="">
                </div>                      
                <div class="carousel-item">
                    <img src="images/corporate3.jpg" class="w-100" alt="">
                </div>                          
            </div>
        </div>

        <h3 class="mt-5">SLDER WITH CONTROLS</h3>
        <div class="carousel slide" data-bs-ride="carousel" id="my_company_home_slide">
            <div class="carousel-inner">
                <div class="carousel-item active">
                    <img src="images/corporate1.jpg" class="d-block w-100" alt="">
                </div>
                <div class="carousel-item">
                    <img src="images/corporate2.jpg" class="d-block w-100" alt="">
                </div>                      
                <div class="carousel-item">
                    <img src="images/corporate3.jpg" class="d-block w-100" alt="">
                </div>                          
            </div>
            <button class="carousel-control-prev" type="button" data-bs-target="#my_company_home_slide" data-bs-slide="prev">
                <span class="carousel-control-prev-icon" aria-hidden="true"></span>
                <span class="visually-hidden">Previous</span>
              </button>
              <button class="carousel-control-next" type="button" data-bs-target="#my_company_home_slide" data-bs-slide="next">
                <span class="carousel-control-next-icon" aria-hidden="true"></span>
                <span class="visually-hidden">Next</span>
              </button>
        </div>   
        
 
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script src="https://unpkg.com/@popperjs/core@2/dist/umd/popper.js"></script>
    <script src="js/bootstrap.js"></script>


</body>

</html>
